services:
  postgres:
    image: postgres:16-alpine
    container_name: odoo_auditor_postgres
    environment:
      POSTGRES_USER: odoo_auditor
      POSTGRES_PASSWORD: change_me_in_production
      POSTGRES_DB: odoo_auditor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo_auditor"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odoo_auditor_app
    environment:
      DATABASE_URL: postgresql://odoo_auditor:change_me_in_production@postgres:5432/odoo_auditor
      FERNET_KEY: ${FERNET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
